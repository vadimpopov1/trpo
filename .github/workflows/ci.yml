name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip g++ make gfortran
          pip3 install numpy

      - name: Build OpenBLAS
        run: |
          cd third_party/OpenBLAS
          make USE_OPENMP=0 NO_LAPACK=1 ONLY_CBLAS=1 -j$(nproc) 2>&1 | tail -10

      - name: Fix lib symlink
        run: |
          cd third_party/OpenBLAS
          SO=$(ls libopenblas*.so 2>/dev/null | head -1)
          [ -n "$SO" ] && ln -sf "$SO" libopenblas_armv8p-r0.3.31.dev.dylib

      - name: Build syrc
        run: |
          cd syrc && g++ -std=c++11 -O2 syrc.cpp -o syrc -ldl

      - name: Run Python tests
        run: |
          export LD_LIBRARY_PATH=$PWD/third_party/OpenBLAS
          python3 python_tests.py

      - name: Run syrc benchmark
        run: |
          export LD_LIBRARY_PATH=$PWD/third_party/OpenBLAS
          cd syrc && ./syrc 2>&1